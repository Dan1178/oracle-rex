{% load django_vite %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Oracle Rex</title>
    {# Vite/React assets. In dev these point at the Vite dev server (HMR); in #}
    {# production they resolve to the hashed bundles via the build manifest. #}
    {% vite_hmr_client %}
    {% vite_react_refresh %}
    {% vite_asset 'src/main.tsx' %}
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
