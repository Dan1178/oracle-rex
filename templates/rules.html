{% load static %}
<div id="rules" class="tab-pane">
    <h2>Rules Q&A</h2>
    <p class="tab-intro">
        Ask a Twilight Imperium rules question. Try a sample question below (no API key
        needed), or type your own and click Ask.
    </p>

    <div class="demo-box">
        <h4>Try a sample question</h4>
        <div id="rules-chips" class="demo-chips"></div>
    </div>

    <textarea id="rules-question"
              placeholder="Ask a rules question (e.g., Can I move a carrier two tiles?)"></textarea>
    <button onclick="askRules()">Ask Oracle Rex</button>
    <div id="rules-answer" class="response-box"></div>
    <script src="static/js/rules.js"></script>
</div>
